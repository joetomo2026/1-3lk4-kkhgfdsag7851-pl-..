<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>建築設備士 2次試験 必須問題対策</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=M+PLUS+1p:wght@400;700&display=swap');
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#21253a;--border:#2e3454;
  --accent1:#4f9cf9;--accent2:#7c5cfc;--text:#e8eaf0;--text-sub:#8892b0;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* HEADER */
header{background:linear-gradient(135deg,#0f1117,#1a1d27);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;}
header h1{font-family:"M PLUS 1p",sans-serif;font-size:13px;font-weight:700;line-height:1.3;}
header h1 span{color:var(--accent1);}
.header-right{margin-left:auto;}
.total-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--text-sub);}
.total-pill strong{color:var(--accent1);}

/* NAV */
.nav-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-tab{flex:1;padding:9px 4px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;color:var(--text-sub);border-bottom:2px solid transparent;transition:all .15s;}
.nav-tab.active{color:var(--accent1);border-bottom-color:var(--accent1);}

/* OUTER LAYOUT */
.app{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.sb-section{padding:10px 10px 4px;}
.sb-label{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text-sub);text-transform:uppercase;margin-bottom:5px;}
.field-tabs{display:flex;flex-direction:column;gap:2px;padding:0 7px 7px;}
.field-tab{padding:7px 9px;border-radius:7px;border:1px solid transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;font-size:11px;font-weight:500;color:var(--text-sub);}
.field-tab:hover{background:var(--card);color:var(--text);}
.field-tab.active{color:var(--text);border-color:var(--border);background:var(--card);}
.field-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.field-count{margin-left:auto;font-size:10px;background:var(--bg);padding:1px 5px;border-radius:7px;}
.year-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:0 7px 9px;}
.year-btn{padding:5px 2px;border-radius:5px;border:1px solid var(--border);font-size:10px;cursor:pointer;text-align:center;background:var(--card);color:var(--text-sub);transition:all .15s;}
.year-btn:hover{color:var(--text);border-color:var(--accent1);}
.year-btn.active{background:var(--accent1);color:#fff;border-color:var(--accent1);font-weight:700;}
.year-btn.all-btn{grid-column:span 5;}
.divider{height:1px;background:var(--border);margin:2px 0;}
.q-list{flex:1;overflow-y:auto;padding:0 7px 10px;}
.q-item{padding:7px 8px;border-radius:6px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;display:flex;align-items:flex-start;gap:6px;transition:background .12s;}
.q-item:hover{background:var(--card);}
.q-item.active{background:var(--card);border-color:var(--border);}
.q-num-b{font-size:10px;font-weight:700;padding:1px 5px;border-radius:6px;flex-shrink:0;margin-top:2px;color:#fff;}
.q-item-inner{flex:1;min-width:0;}
.q-yr-tag{font-size:9px;color:var(--text-sub);margin-bottom:1px;}
.q-item-text{font-size:10px;color:var(--text-sub);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-item.active .q-item-text{color:var(--text);}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.status-done{background:var(--green);}
.status-review{background:var(--yellow);}

/* MAIN AREA */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-sub);gap:10px;}

/* QUESTION PANEL */
#qPanel{flex:1;overflow:hidden;flex-direction:column;display:none;}

/* Q HEADER (fixed, compact) */
.q-header{padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.q-header-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;}
.q-badge-lg{padding:2px 11px;border-radius:13px;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.tag{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500;}
.q-question{font-size:13px;line-height:1.7;color:var(--text);}
.status-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;}
.sb-done{background:rgba(34,197,94,.15);color:var(--green);}
.sb-review{background:rgba(234,179,8,.12);color:var(--yellow);}

/* SPLIT PANE: canvas left, answer right */
.split-pane{flex:1;display:flex;overflow:hidden;gap:0;}

/* LEFT: canvas pane */
.canvas-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px 8px 10px 14px;min-width:0;}
.canvas-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-shrink:0;}
.canvas-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text-sub);text-transform:uppercase;}
.tool-sep{flex:1;}
.pen-size-wrap{display:flex;align-items:center;gap:4px;}
.pen-size-label{font-size:9px;color:var(--text-sub);}
.pen-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.pen-btn:hover{border-color:var(--accent1);}
.pen-btn.active{background:var(--accent1);border-color:var(--accent1);}
.pen-dot{border-radius:50%;background:white;}
.eraser-btn{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:10px;color:var(--text-sub);transition:all .15s;white-space:nowrap;}
.eraser-btn.active{background:var(--yellow);border-color:var(--yellow);color:#000;font-weight:700;}
.clear-canvas-btn{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:10px;color:var(--text-sub);white-space:nowrap;}
.clear-canvas-btn:hover{border-color:var(--red);color:var(--red);}
.canvas-wrap{flex:1;border-radius:9px;overflow:hidden;border:1.5px solid var(--border);background:#0d1020;position:relative;}
.canvas-wrap canvas{display:block;width:100%;height:100%;touch-action:none;}

/* SPLIT DIVIDER */
.split-divider{width:4px;background:var(--border);flex-shrink:0;cursor:col-resize;}
.split-divider:hover{background:var(--accent1);}

/* RIGHT: answer pane */
.answer-pane{width:380px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--border);}

/* Answer pane - hidden state */
.answer-pane.hidden{width:0;overflow:hidden;border-left:none;}

/* Answer toggle button - always visible */
.ans-toggle-bar{padding:10px 14px 0 8px;flex-shrink:0;}
.btn-show-ans{width:100%;padding:9px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-family:"Noto Sans JP",sans-serif;font-weight:700;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-show-ans:hover{opacity:.87;}
.btn-show-ans.shown{background:var(--surface);color:var(--accent1);border:1px solid var(--accent1);}

/* Answer content scroll area */
.answer-scroll{flex:1;overflow-y:auto;padding:10px 14px 14px 14px;}
.model-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 11px;border-radius:7px;background:linear-gradient(135deg,rgba(79,156,249,.1),rgba(124,92,252,.1));border:1px solid rgba(79,156,249,.22);}
.model-hdr-txt{font-size:11px;font-weight:700;color:var(--accent1);}
.ans-item{margin-bottom:8px;background:var(--surface);border-radius:7px;overflow:hidden;border:1px solid var(--border);}
.ans-item-label{padding:6px 11px;font-size:10px;font-weight:700;border-bottom:1px solid var(--border);color:var(--text-sub);}
.ans-item-text{padding:8px 11px;font-size:12px;line-height:1.85;white-space:pre-wrap;color:var(--text);}

/* ACTION BAR */
.action-bar{padding:8px 14px 10px;display:flex;gap:7px;flex-shrink:0;border-top:1px solid var(--border);align-items:center;}
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-family:"Noto Sans JP",sans-serif;font-weight:700;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-done{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.35);}
.btn-done:hover{background:rgba(34,197,94,.25);}
.btn-review{background:rgba(234,179,8,.12);color:var(--yellow);border:1px solid rgba(234,179,8,.3);}
.btn-review:hover{background:rgba(234,179,8,.22);}
.btn-next{background:var(--surface);color:var(--accent1);border:1px solid var(--accent1);margin-left:auto;}
.btn-next:hover{background:var(--accent1);color:#fff;}

/* HISTORY */
.history-view{flex:1;overflow-y:auto;padding:16px;}
.hist-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px;text-align:center;}
.stat-num{font-size:24px;font-weight:700;line-height:1;}
.stat-lbl{font-size:10px;color:var(--text-sub);margin-top:3px;}
.stat-all .stat-num{color:var(--accent1);}
.stat-done .stat-num{color:var(--green);}
.stat-review .stat-num{color:var(--yellow);}
.stat-pct .stat-num{color:var(--accent2);}
.progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:12px;}
.progress-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text-sub);margin-bottom:5px;}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;display:flex;}
.pb-done{background:var(--green);transition:width .4s;}
.pb-review{background:var(--yellow);transition:width .4s;}
.hist-section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin:12px 0 6px;}
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 9px;cursor:pointer;transition:all .15s;}
.hist-card:hover{border-color:var(--accent1);}
.hist-card-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.hist-q-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:5px;color:#fff;}
.hist-year{font-size:9px;color:var(--text-sub);}
.hist-status{margin-left:auto;font-size:9px;padding:1px 5px;border-radius:5px;font-weight:600;}
.hs-done{background:rgba(34,197,94,.15);color:var(--green);}
.hs-review{background:rgba(234,179,8,.12);color:var(--yellow);}
.hist-text{font-size:10px;color:var(--text-sub);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.no-hist{text-align:center;color:var(--text-sub);padding:36px;font-size:12px;}
.clear-hist-btn{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);padding:6px 13px;border-radius:7px;font-size:11px;cursor:pointer;font-family:"Noto Sans JP",sans-serif;font-weight:700;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
</style>
</head>
<body>

<header>
  <div class="logo-mark">設</div>
  <h1>建築設備士 2次試験<br><span>必須問題 対策アプリ</span></h1>
  <div class="header-right">
    <div class="total-pill">H28〜R7 全 <strong id="totalCount">-</strong> 問収録</div>
  </div>
</header>

<div class="nav-tabs">
  <div class="nav-tab active" id="tab-practice">📝 練習</div>
  <div class="nav-tab" id="tab-history">📊 学習履歴</div>
</div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-section"><div class="sb-label">分野</div></div>
    <div class="field-tabs" id="fieldTabs">
      <div class="field-tab active" data-f="all"><div class="field-dot" style="background:#8892b0"></div>すべて<span class="field-count" id="fc-all">-</span></div>
      <div class="field-tab" data-f="空調・換気"><div class="field-dot" style="background:#4f9cf9"></div>空調・換気<span class="field-count" id="fc-空調">-</span></div>
      <div class="field-tab" data-f="給排水衛生"><div class="field-dot" style="background:#22c55e"></div>給排水衛生<span class="field-count" id="fc-給排水">-</span></div>
      <div class="field-tab" data-f="電気"><div class="field-dot" style="background:#f97316"></div>電気<span class="field-count" id="fc-電気">-</span></div>
      <div class="field-tab" data-f="消防・防災"><div class="field-dot" style="background:#ef4444"></div>消防・防災<span class="field-count" id="fc-消防">-</span></div>
      <div class="field-tab" data-f="共通・省エネ"><div class="field-dot" style="background:#a78bfa"></div>共通・省エネ<span class="field-count" id="fc-共通">-</span></div>
    </div>
    <div class="divider"></div>
    <div class="sb-section"><div class="sb-label">年度</div></div>
    <div class="year-grid">
      <div class="year-btn all-btn active" data-y="all">全年度</div>
      <div class="year-btn" data-y="H28">H28</div><div class="year-btn" data-y="H29">H29</div>
      <div class="year-btn" data-y="H30">H30</div><div class="year-btn" data-y="R1">R1</div>
      <div class="year-btn" data-y="R2">R2</div><div class="year-btn" data-y="R3">R3</div>
      <div class="year-btn" data-y="R4">R4</div><div class="year-btn" data-y="R5">R5</div>
      <div class="year-btn" data-y="R6">R6</div><div class="year-btn" data-y="R7">R7</div>
    </div>
    <div class="divider"></div>
    <div class="q-list" id="qList"></div>
  </aside>

  <!-- PRACTICE VIEW -->
  <main class="main" id="practiceView">
    <div class="empty-state" id="emptyState">
      <div style="font-size:42px;opacity:.4">📝</div>
      <div style="font-size:15px;font-weight:700;color:var(--text)">問題を選んで練習しよう</div>
      <div style="font-size:11px;text-align:center;max-width:220px;line-height:1.8;color:var(--text-sub)">
        左のリストから年度・分野を絞り込み<br>解きたい問題を選択してください。<br>タッチペンで手書き解答できます。
      </div>
    </div>

    <!-- QUESTION PANEL -->
    <div id="qPanel">
      <!-- Fixed header -->
      <div class="q-header">
        <div class="q-header-top" id="qHeaderTop"></div>
        <div class="q-question" id="qQuestion"></div>
      </div>

      <!-- Split: canvas | answer -->
      <div class="split-pane">

        <!-- LEFT: canvas pane -->
        <div class="canvas-pane">
          <div class="canvas-toolbar">
            <span class="canvas-label">✏️ 解答欄</span>
            <div class="tool-sep"></div>
            <div class="pen-size-wrap">
              <span class="pen-size-label">太さ</span>
              <button class="pen-btn active" id="penThin"><div class="pen-dot" style="width:3px;height:3px"></div></button>
              <button class="pen-btn" id="penMed"><div class="pen-dot" style="width:5px;height:5px"></div></button>
              <button class="pen-btn" id="penThick"><div class="pen-dot" style="width:8px;height:8px"></div></button>
            </div>
            <button class="eraser-btn" id="eraserBtn">消しゴム</button>
            <button class="clear-canvas-btn" id="clearCanvasBtn">全消去</button>
          </div>
          <div class="canvas-wrap" id="canvasWrap">
            <canvas id="drawCanvas"></canvas>
          </div>
        </div>

        <!-- RIGHT: answer pane -->
        <div class="answer-pane hidden" id="answerPane">
          <div class="ans-toggle-bar">
            <button class="btn-show-ans shown" id="btnHideAns">✕ 解答例を閉じる</button>
          </div>
          <div class="answer-scroll" id="answerScroll"></div>
        </div>

      </div><!-- /split-pane -->

      <!-- Action bar -->
      <div class="action-bar">
        <button class="btn-show-ans" id="btnShowAns" style="padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;display:flex;align-items:center;gap:5px;">💡 解答例を見る</button>
        <button class="btn btn-done" id="btnDone">✅ 完了</button>
        <button class="btn btn-review" id="btnReview">🔁 要復習</button>
        <button class="btn btn-next" id="btnNext">次の問題 →</button>
      </div>

    </div><!-- /qPanel -->
  </main>

  <!-- HISTORY VIEW -->
  <div class="history-view" id="historyView" style="display:none;">
    <div style="margin-bottom:12px;">
      <div style="font-size:16px;font-weight:700;margin-bottom:3px;">📊 学習履歴</div>
      <div style="font-size:11px;color:var(--text-sub)">学習した問題の記録を確認できます</div>
    </div>
    <div class="hist-stats">
      <div class="stat-card stat-all"><div class="stat-num" id="st-total">0</div><div class="stat-lbl">総問題数</div></div>
      <div class="stat-card stat-done"><div class="stat-num" id="st-done">0</div><div class="stat-lbl">✅ 完了</div></div>
      <div class="stat-card stat-review"><div class="stat-num" id="st-review">0</div><div class="stat-lbl">🔁 要復習</div></div>
      <div class="stat-card stat-pct"><div class="stat-num" id="st-pct">0%</div><div class="stat-lbl">学習進捗</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span>進捗バー</span><span id="prog-label">0 / 106 問</span></div>
      <div class="progress-bar">
        <div class="pb-done" id="pb-done" style="width:0%"></div>
        <div class="pb-review" id="pb-review" style="width:0%"></div>
      </div>
    </div>
    <div id="hist-by-field"></div>
    <div style="margin-top:12px;display:flex;justify-content:flex-end;">
      <button class="clear-hist-btn" id="clearHistBtn">🗑️ 履歴をすべてリセット</button>
    </div>
  </div>
</div>

var _bytes = Uint8Array.from(atob(B64), function(c){ return c.charCodeAt(0); });
var QUESTIONS = JSON.parse(new TextDecoder("utf-8").decode(_bytes));
var TOTAL = QUESTIONS.length;
document.getElementById('totalCount').textContent = TOTAL;

var HIST_KEY = 'ksetsubishi_hist_v3';
var FCOL = {'空調・換気':'#4f9cf9','給排水衛生':'#22c55e','電気':'#f97316','消防・防災':'#ef4444','共通・省エネ':'#a78bfa'};
var FBG  = {'空調・換気':'#1e3a5f','給排水衛生':'#1e3d2f','電気':'#3d2a1e','消防・防災':'#3d1e1e','共通・省エネ':'#2e2e3d'};

function loadHistory(){ try{return JSON.parse(localStorage.getItem(HIST_KEY)||'{}');}catch(e){return {};} }
function saveHistory(h){ localStorage.setItem(HIST_KEY, JSON.stringify(h)); }
function getStatus(yr,qn){ return loadHistory()[yr+'_'+qn]||''; }
function setStatus(yr,qn,st){ var h=loadHistory(),k=yr+'_'+qn; if(st==='')delete h[k]; else h[k]=st; saveHistory(h); }
function qid(q){ return q.year+'_'+q.q_num; }

var curField='all', curYear='all', curQid=null, answerShown=false;

function getFiltered(){
  return QUESTIONS.filter(function(q){
    return (curField==='all'||q.field===curField)&&(curYear==='all'||q.year===curYear);
  });
}

// ===== TABS =====
document.getElementById('tab-practice').addEventListener('click', function(){ switchTab('practice'); });
document.getElementById('tab-history').addEventListener('click',  function(){ switchTab('history'); });
function switchTab(tab){
  document.getElementById('tab-practice').classList.toggle('active', tab==='practice');
  document.getElementById('tab-history').classList.toggle('active', tab==='history');
  document.getElementById('practiceView').style.display = tab==='practice' ? 'flex' : 'none';
  document.getElementById('historyView').style.display  = tab==='history'  ? 'block': 'none';
  if(tab==='history') renderHistory();
}

// ===== SIDEBAR =====
document.getElementById('fieldTabs').addEventListener('click', function(e){
  var t=e.target.closest('.field-tab'); if(!t) return; setField(t.dataset.f);
});
document.querySelector('.year-grid').addEventListener('click', function(e){
  var t=e.target.closest('.year-btn'); if(!t) return; setYear(t.dataset.y);
});
function setField(f){
  curField=f;
  document.querySelectorAll('.field-tab').forEach(function(el){el.classList.toggle('active',el.dataset.f===f);});
  renderList(); clearMain();
}
function setYear(y){
  curYear=y;
  document.querySelectorAll('.year-btn').forEach(function(el){el.classList.toggle('active',el.dataset.y===y);});
  renderList(); clearMain();
}
function clearMain(){
  curQid=null;
  document.getElementById('emptyState').style.display='flex';
  document.getElementById('qPanel').style.display='none';
}

// ===== Q LIST =====
function renderList(){
  var filtered=getFiltered(), hist=loadHistory();
  var cf={'空調・換気':0,'給排水衛生':0,'電気':0,'消防・防災':0,'共通・省エネ':0};
  QUESTIONS.filter(function(q){return curYear==='all'||q.year===curYear;}).forEach(function(q){cf[q.field]++;});
  var tot=Object.values(cf).reduce(function(a,b){return a+b;},0);
  document.getElementById('fc-all').textContent=tot;
  document.getElementById('fc-空調').textContent=cf['空調・換気'];
  document.getElementById('fc-給排水').textContent=cf['給排水衛生'];
  document.getElementById('fc-電気').textContent=cf['電気'];
  document.getElementById('fc-消防').textContent=cf['消防・防災'];
  document.getElementById('fc-共通').textContent=cf['共通・省エネ'];
  var list=document.getElementById('qList');
  if(!filtered.length){list.innerHTML='<div style="text-align:center;color:var(--text-sub);padding:20px;font-size:10px">該当なし</div>';return;}
  list.innerHTML=filtered.map(function(q){
    var id=qid(q),st=hist[id]||'',col=FCOL[q.field]||'#888';
    var dc=st==='done'?'status-dot status-done':st==='review'?'status-dot status-review':'status-dot';
    var ds=st?'':'background:transparent;border:1px solid var(--border)';
    var sq=q.question.length>36?q.question.slice(0,36)+'…':q.question;
    return '<div class="q-item" data-qid="'+esc(id)+'">'
      +'<span class="q-num-b" style="background:'+col+'">'+esc(q.q_num)+'</span>'
      +'<div class="q-item-inner">'
        +'<div class="q-yr-tag">'+esc(q.year_label)+'（'+esc(q.theme)+'）</div>'
        +'<div class="q-item-text">'+esc(sq)+'</div>'
      +'</div><div class="'+dc+'" style="'+ds+'"></div></div>';
  }).join('');
  list.querySelectorAll('.q-item').forEach(function(el){
    el.addEventListener('click', function(){ selectQ(el.dataset.qid); });
  });
}

// ===== SELECT Q =====
function selectQ(id){
  var parts=id.split('_'), yr=parts[0], qn=parts[1];
  var q=QUESTIONS.find(function(x){return x.year===yr&&x.q_num===qn;}); if(!q)return;
  curQid=id;
  document.querySelectorAll('.q-item').forEach(function(el){el.classList.remove('active');});
  var li=document.querySelector('.q-item[data-qid="'+id+'"]');
  if(li){li.classList.add('active');li.scrollIntoView({block:'nearest'});}

  document.getElementById('emptyState').style.display='none';
  document.getElementById('qPanel').style.display='flex';

  var col=FCOL[q.field]||'#888', bg=FBG[q.field]||'#1a1d27';
  var st=getStatus(yr,qn);
  var isOfficial=['H30','R1','R2','R3'].includes(q.year);
  var stBadge=st==='done'
    ?'<span class="status-badge sb-done">✅ 完了</span>'
    :st==='review'?'<span class="status-badge sb-review">🔁 要復習</span>':'';

  document.getElementById('qHeaderTop').innerHTML=
    '<span class="q-badge-lg" style="background:'+col+'">第'+esc(q.q_num)+'問</span>'
    +'<span class="tag" style="background:color-mix(in srgb,'+bg+' 70%,transparent);color:'+col+'">'+esc(q.field)+'</span>'
    +'<span class="tag" style="background:rgba(136,146,176,.12);color:var(--text-sub)">'+esc(q.year_label)+'</span>'
    +'<span class="tag" style="background:rgba(136,146,176,.08);color:var(--text-sub);font-size:9px">'+esc(q.theme)+'</span>'
    +stBadge;
  document.getElementById('qQuestion').textContent=q.question;

  // Build answer content (hidden panel)
  var answersHtml=q.answers.map(function(a){
    return '<div class="ans-item">'
      +'<div class="ans-item-label">▶ '+esc(a.label)+'</div>'
      +'<div class="ans-item-text">'+esc(a.text)+'</div></div>';
  }).join('');
  document.getElementById('answerScroll').innerHTML=
    '<div class="model-hdr">'
      +'<span style="font-size:14px">💡</span>'
      +'<span class="model-hdr-txt">解答例・参考ポイント</span>'
      +'<span style="font-size:10px;color:var(--text-sub);margin-left:6px">'+(isOfficial?'（公式解答例）':'（AI参考解答例）')+'</span>'
    +'</div>'+answersHtml;

  // Hide answer pane, reset show button
  hideAnswerPane();
  clearCanvas();
  setTimeout(resizeCanvas, 50);
}

// ===== ANSWER PANE TOGGLE =====
function showAnswerPane(){
  answerShown=true;
  var pane=document.getElementById('answerPane');
  pane.classList.remove('hidden');
  document.getElementById('btnShowAns').style.display='none';
  setTimeout(resizeCanvas, 30);
}
function hideAnswerPane(){
  answerShown=false;
  var pane=document.getElementById('answerPane');
  pane.classList.add('hidden');
  document.getElementById('btnShowAns').style.display='flex';
  setTimeout(resizeCanvas, 30);
}
document.getElementById('btnShowAns').addEventListener('click', showAnswerPane);
document.getElementById('btnHideAns').addEventListener('click', hideAnswerPane);

// ===== CANVAS =====
var canvas, ctx, isDrawing=false, eraserMode=false, penSize=2;
var lastX=0, lastY=0;
function initCanvas(){
  canvas=document.getElementById('drawCanvas');
  ctx=canvas.getContext('2d');
  ctx.lineCap='round'; ctx.lineJoin='round';
  canvas.addEventListener('pointerdown', onDown);
  canvas.addEventListener('pointermove', onMove);
  canvas.addEventListener('pointerup',   onUp);
  canvas.addEventListener('pointerout',  onUp);
  canvas.addEventListener('contextmenu', function(e){e.preventDefault();});
  document.getElementById('penThin').addEventListener('click',  function(){ setPen(2,this); });
  document.getElementById('penMed').addEventListener('click',   function(){ setPen(4,this); });
  document.getElementById('penThick').addEventListener('click', function(){ setPen(7,this); });
  document.getElementById('eraserBtn').addEventListener('click', toggleEraser);
  document.getElementById('clearCanvasBtn').addEventListener('click', clearCanvas);
}
function setPen(sz,btn){
  penSize=sz; eraserMode=false;
  document.querySelectorAll('.pen-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('eraserBtn').classList.remove('active');
}
function toggleEraser(){
  eraserMode=!eraserMode;
  document.getElementById('eraserBtn').classList.toggle('active',eraserMode);
  if(eraserMode) document.querySelectorAll('.pen-btn').forEach(function(b){b.classList.remove('active');});
  else document.getElementById('penThin').classList.add('active');
}
function getPos(e){
  var r=canvas.getBoundingClientRect();
  return {x:(e.clientX-r.left)*(canvas.width/r.width), y:(e.clientY-r.top)*(canvas.height/r.height)};
}
function onDown(e){
  e.preventDefault(); isDrawing=true; canvas.setPointerCapture(e.pointerId);
  var p=getPos(e); lastX=p.x; lastY=p.y;
  if(eraserMode){ ctx.clearRect(p.x-12,p.y-12,24,24); }
  else { ctx.fillStyle='#e8eaf0'; ctx.beginPath(); ctx.arc(p.x,p.y,penSize/2,0,Math.PI*2); ctx.fill(); }
}
function onMove(e){
  if(!isDrawing) return; e.preventDefault();
  var p=getPos(e);
  if(eraserMode){ var r=penSize*4; ctx.clearRect(p.x-r,p.y-r,r*2,r*2); }
  else { ctx.strokeStyle='#e8eaf0'; ctx.lineWidth=penSize; ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke(); }
  lastX=p.x; lastY=p.y;
}
function onUp(){ isDrawing=false; }
function resizeCanvas(){
  var wrap=document.getElementById('canvasWrap');
  var w=wrap.clientWidth, h=wrap.clientHeight;
  if(w<=0||h<=0) return;
  var img=canvas.toDataURL();
  canvas.width=w; canvas.height=h;
  ctx.lineCap='round'; ctx.lineJoin='round';
  var im=new Image(); im.onload=function(){ ctx.drawImage(im,0,0); }; im.src=img;
}
function clearCanvas(){ if(canvas) ctx.clearRect(0,0,canvas.width,canvas.height); }
window.addEventListener('resize', function(){ if(canvas&&canvas.width>0) resizeCanvas(); });

// ===== ACTION BUTTONS =====
document.getElementById('btnDone').addEventListener('click',   function(){ markStatus('done'); });
document.getElementById('btnReview').addEventListener('click', function(){ markStatus('review'); });
document.getElementById('btnNext').addEventListener('click',   nextQ);
function markStatus(st){
  if(!curQid) return;
  var p=curQid.split('_'); setStatus(p[0],p[1],st);
  var badge=st==='done'
    ?'<span class="status-badge sb-done">✅ 完了</span>'
    :'<span class="status-badge sb-review">🔁 要復習</span>';
  var top=document.getElementById('qHeaderTop');
  top.querySelectorAll('.status-badge').forEach(function(el){el.remove();});
  top.insertAdjacentHTML('beforeend',badge);
  renderList();
  var li=document.querySelector('.q-item[data-qid="'+curQid+'"]');
  if(li) li.classList.add('active');
}
function nextQ(){
  var f=getFiltered(); if(!curQid||!f.length) return;
  var p=curQid.split('_');
  var idx=f.findIndex(function(q){return q.year===p[0]&&q.q_num===p[1];});
  selectQ(qid(f[(idx+1)%f.length]));
}

// ===== HISTORY =====
function renderHistory(){
  var hist=loadHistory();
  var dk=Object.keys(hist).filter(function(k){return hist[k]==='done';});
  var rk=Object.keys(hist).filter(function(k){return hist[k]==='review';});
  var st=dk.length+rk.length;
  document.getElementById('st-total').textContent=TOTAL;
  document.getElementById('st-done').textContent=dk.length;
  document.getElementById('st-review').textContent=rk.length;
  document.getElementById('st-pct').textContent=Math.round(st/TOTAL*100)+'%';
  document.getElementById('prog-label').textContent=st+' / '+TOTAL+' 問';
  document.getElementById('pb-done').style.width=(dk.length/TOTAL*100)+'%';
  document.getElementById('pb-review').style.width=(rk.length/TOTAL*100)+'%';
  var FIELDS=['空調・換気','給排水衛生','電気','消防・防災','共通・省エネ'];
  var html='';
  FIELDS.forEach(function(field){
    var qs=QUESTIONS.filter(function(q){return q.field===field;});
    var sq=qs.filter(function(q){var s=hist[qid(q)];return s==='done'||s==='review';});
    var col=FCOL[field]||'#888';
    html+='<div class="hist-section-title" style="color:'+col+'">'+field+'（'+sq.length+'/'+qs.length+'問学習済み）</div>';
    if(!sq.length){html+='<div style="font-size:10px;color:var(--text-sub);padding:5px">まだ学習記録がありません</div>';return;}
    html+='<div class="hist-grid">';
    sq.sort(function(a,b){return a.year.localeCompare(b.year)||parseInt(a.q_num)-parseInt(b.q_num);})
      .forEach(function(q){
        var s=hist[qid(q)];
        var sl=s==='done'?'<span class="hist-status hs-done">✅完了</span>':'<span class="hist-status hs-review">🔁復習</span>';
        html+='<div class="hist-card" data-field="'+esc(field)+'" data-qid="'+esc(qid(q))+'">'
          +'<div class="hist-card-top"><span class="hist-q-badge" style="background:'+col+'">'+esc(q.q_num)+'</span>'
          +'<span class="hist-year">'+esc(q.year_label)+'</span>'+sl+'</div>'
          +'<div class="hist-text">'+esc(q.question)+'</div></div>';
      });
    html+='</div>';
  });
  if(!html) html='<div class="no-hist">まだ学習記録がありません。</div>';
  var con=document.getElementById('hist-by-field');
  con.innerHTML=html;
  con.querySelectorAll('.hist-card').forEach(function(card){
    card.addEventListener('click', function(){
      switchTab('practice');
      setTimeout(function(){setYear('all');setField(card.dataset.field);selectQ(card.dataset.qid);},50);
    });
  });
}
document.getElementById('clearHistBtn').addEventListener('click', function(){
  if(!confirm('学習履歴をすべてリセットしますか？')) return;
  localStorage.removeItem(HIST_KEY); renderList(); renderHistory();
});

// ===== UTILS =====
function esc(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

// ===== INIT =====
initCanvas();
renderList();
</script>
